<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Pathway Overgrown | PlantCare</title>
    <meta name="description" content="Oops! This botanical pathway is overgrown. Let's head back to safety.">
    <!-- Fonts & CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        .error-layout {
            display: flex;
            min-height: 100vh;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(135deg, #f4f9f4 0%, #eaf4ec 100%);
            padding: 24px;
            transition: background var(--transition-speed);
        }
        [data-theme="dark"] .error-layout {
            background: linear-gradient(135deg, #0c1811 0%, #09170f 100%);
        }
        .error-card {
            max-width: 500px;
            padding: 40px;
        }
    </style>
</head>
<body>

    <main class="error-layout">
        <div class="glass-card error-card zoom-in">
            <!-- Animated seedling showing overgrown path -->
            <svg viewBox="0 0 200 200" width="120px" height="120px" style="margin: 0 auto 30px auto;">
                <circle cx="100" cy="100" r="80" fill="var(--accent-soft)" />
                <!-- Vine curves representing overgrown paths -->
                <path d="M50 150 Q100 130 90 90 T140 50" fill="none" stroke="var(--primary-color)" stroke-width="4" stroke-linecap="round" />
                <path d="M150 150 Q100 130 110 100 T60 60" fill="none" stroke="var(--primary-light)" stroke-width="3" stroke-linecap="round" />
                <!-- Alert icon -->
                <circle cx="100" cy="120" r="14" fill="var(--danger-color)" />
                <text x="100" y="125" fill="white" font-weight="bold" font-size="16" text-anchor="middle">!</text>
            </svg>
            
            <h1 style="font-family: var(--font-heading); font-size: 4rem; color: var(--primary-color); font-weight: 800; line-height: 1.1; margin-bottom: 12px;">404</h1>
            <h2 style="font-family: var(--font-heading); font-size: 1.6rem; color: var(--text-main); margin-bottom: 16px;">Pathway Overgrown!</h2>
            <p style="color: var(--text-muted); margin-bottom: 30px; font-size: 1rem; line-height: 1.6;">
                Oops! The botanical pathway you are searching for is overgrown with vines. Let's return to the safety of our main garden path.
            </p>
            
            <a href="index.html" class="btn btn-primary" style="padding: 12px 30px;">
                Return Home 🏡
            </a>
        </div>
    </main>

    <!-- Dark Mode Support -->
    <script>
        // Set initial theme
        const currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</body>
</html>
